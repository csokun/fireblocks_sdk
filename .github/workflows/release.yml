name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: hex
      url: https://hex.pm/packages/fireblocks_sdk
    env:
      HEX_API_KEY: ${{ secrets.HEXPM_API_KEY }}
      MIX_ENV: dev

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Elixir and Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Publish package
        run: mix hex.publish --yes
